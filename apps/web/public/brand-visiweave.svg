<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">VisiWeave logo mark</title>
  <desc id="desc">A warm paper canvas mark with interwoven copper and teal ribbons and a central motion play symbol.</desc>
  <defs>
    <linearGradient id="paper" x1="140" y1="132" x2="884" y2="892" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#f3dfbd"/>
    </linearGradient>
    <linearGradient id="copper" x1="244" y1="324" x2="786" y2="732" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e18655"/>
      <stop offset="0.58" stop-color="#c65f32"/>
      <stop offset="1" stop-color="#7e321a"/>
    </linearGradient>
    <linearGradient id="teal" x1="220" y1="704" x2="804" y2="296" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d9fbf4"/>
      <stop offset="0.32" stop-color="#2c9c91"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#15110d" flood-opacity="0.18"/>
    </filter>
    <filter id="ribbonShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#15110d" flood-opacity="0.18"/>
    </filter>
  </defs>
  <g filter="url(#softShadow)">
    <rect x="132" y="132" width="760" height="760" rx="148" fill="url(#paper)" stroke="#15110d" stroke-width="28"/>
    <path d="M244 512c90-154 187-230 292-230 136 0 246 102 246 230S672 742 536 742c-105 0-202-76-292-230Z" fill="#fff7e6" stroke="#15110d" stroke-width="22"/>
  </g>
  <g filter="url(#ribbonShadow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M250 632c105-171 195-248 286-248 77 0 139 49 204 128" stroke="url(#teal)" stroke-width="96"/>
    <path d="M250 392c105 171 195 248 286 248 77 0 139-49 204-128" stroke="url(#copper)" stroke-width="96"/>
    <path d="M290 632c88-126 162-181 246-181 70 0 126 35 178 95" stroke="#fff7e6" stroke-width="26" opacity="0.82"/>
    <path d="M290 392c88 126 162 181 246 181 70 0 126-35 178-95" stroke="#fff7e6" stroke-width="26" opacity="0.78"/>
  </g>
  <path d="M454 394 660 512 454 630Z" fill="#15110d"/>
  <path d="M480 438 606 512 480 586Z" fill="#fff7e6"/>
  <g fill="#15110d">
    <rect x="284" y="300" width="44" height="44" rx="12"/>
    <rect x="366" y="300" width="44" height="44" rx="12"/>
    <rect x="284" y="680" width="44" height="44" rx="12"/>
    <rect x="366" y="680" width="44" height="44" rx="12"/>
    <circle cx="744" cy="512" r="28"/>
  </g>
</svg>
